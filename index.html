<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Flight Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>✈️ Live Flight Tracker</h1>
    <input type="text" id="searchInput" placeholder="Search by airline, flight..." />
    
    <select id="statusFilter">
      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="landed">Landed</option>
      <option value="scheduled">Scheduled</option>
    </select>

    <select id="sortOption">
      <option value="">Sort</option>
      <option value="az">Airline A-Z</option>
      <option value="za">Airline Z-A</option>
    </select>

    <button id="toggleTheme">🌙 Toggle Theme</button>
  </header>

  <main>
    <div id="loader">Loading flights...</div>
    <div id="flightContainer"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
